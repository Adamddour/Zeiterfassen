<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arbeitszeiterfassung - Glassmorphism</title>
    <!-- jsPDF für PDF-Export hinzufügen -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
    <style>
        /* Grundlegendes Reset und Schriftart */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            /* Angepasst auf O2-Blau Farbpalette */
            background: linear-gradient(-45deg, #000B42, #0019A5, #0044FF, #0019A5);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 2rem 1rem;
            position: relative;
            overflow-x: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Animierte Hintergrund-Glaskreise für den 3D-Effekt */
        .circle {
            position: fixed;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.15), rgba(255, 255, 255, 0.02));
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.15);
            z-index: -1;
            animation: float 12s infinite ease-in-out alternate;
        }

        .circle-1 {
            width: 350px;
            height: 350px;
            top: -50px;
            left: -100px;
        }

        .circle-2 {
            width: 450px;
            height: 450px;
            bottom: -100px;
            right: -100px;
            animation-delay: -6s;
        }

        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg) scale(1); }
            100% { transform: translateY(-40px) rotate(10deg) scale(1.05); }
        }

        /* Hauptcontainer */
        .container {
            width: 100%;
            max-width: 900px;
            margin: 0 auto;
            z-index: 1;
        }

        .title {
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 2rem;
            font-weight: 700;
            letter-spacing: 1px;
            text-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        /* Glassmorphism Panel Basisklasse */
        .glass-panel {
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 1.25rem;
            padding: 2rem;
            box-shadow: 0 8px 32px 0 rgba(0, 10, 50, 0.4);
            margin-bottom: 2rem;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .panel-title {
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            font-weight: 600;
            border-bottom: 2px solid rgba(255, 255, 255, 0.2);
            padding-bottom: 0.5rem;
            display: inline-block;
        }

        /* Formular Styling */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        .form-group.full-width {
            grid-column: 1 / -1;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.95rem;
            color: rgba(255, 255, 255, 0.95);
            font-weight: 500;
        }

        input, textarea {
            width: 100%;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 0.75rem;
            padding: 0.8rem 1rem;
            color: white;
            font-family: inherit;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
        }

        input:focus {
            background: rgba(255, 255, 255, 0.25);
            border-color: rgba(255, 255, 255, 0.6);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.15);
        }

        ::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        ::-webkit-calendar-picker-indicator {
            filter: invert(1);
            cursor: pointer;
            opacity: 0.8;
        }

        ::-webkit-calendar-picker-indicator:hover {
            opacity: 1;
        }

        /* Buttons */
        .btn {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.25), rgba(255, 255, 255, 0.05));
            border: 1px solid rgba(255, 255, 255, 0.4);
            padding: 0.8rem 1.5rem;
            border-radius: 0.75rem;
            color: white;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            width: 100%;
            margin-top: 1rem;
        }

        .btn:hover {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.35), rgba(255, 255, 255, 0.15));
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.2);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-delete {
            background: rgba(255, 82, 82, 0.3);
            border-color: rgba(255, 82, 82, 0.5);
            padding: 0.4rem 0.8rem;
            font-size: 0.85rem;
            width: auto;
            margin-top: 0;
            border-radius: 0.5rem;
        }

        .btn-delete:hover {
            background: rgba(255, 82, 82, 0.5);
        }

        .btn-export {
            background: linear-gradient(135deg, rgba(0, 68, 255, 0.4), rgba(0, 25, 165, 0.2));
            border-color: rgba(0, 100, 255, 0.5);
            margin-top: 1.5rem;
        }

        .btn-logout {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.3);
            margin-top: 0;
            width: auto;
            font-size: 0.9rem;
            padding: 0.5rem 1rem;
        }

        /* Nachrichten / Warnungen */
        .message-box {
            background: rgba(255, 100, 100, 0.2);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 100, 100, 0.5);
            padding: 1rem;
            border-radius: 0.75rem;
            margin-bottom: 1.5rem;
            display: none;
            color: #fff;
            font-weight: 500;
        }

        /* Tabelle */
        .total-time-display {
            font-size: 1.25rem;
            margin-bottom: 1rem;
            background: rgba(255, 255, 255, 0.1);
            padding: 1rem;
            border-radius: 0.75rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
            text-align: center;
        }

        .table-responsive {
            overflow-x: auto;
            border-radius: 0.75rem;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            min-width: 600px;
        }

        th, td {
            padding: 1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.15);
        }

        th {
            background: rgba(255, 255, 255, 0.05);
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
            color: rgba(255, 255, 255, 0.8);
        }

        tr:last-child td { border-bottom: none; }
        tr:hover td { background: rgba(255, 255, 255, 0.05); }

        .empty-state {
            text-align: center;
            padding: 2rem;
            color: rgba(255, 255, 255, 0.7);
            font-style: italic;
        }

        /* Ansichten-Steuerung */
        #auth-view {
            display: block;
            max-width: 400px;
            margin: 0 auto;
            margin-top: 5vh;
        }

        #dashboard-view {
            display: none;
        }

        .header-flex {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .toggle-link {
            text-align: center;
            margin-top: 1rem;
            font-size: 0.9rem;
            cursor: pointer;
            text-decoration: underline;
            color: rgba(255,255,255,0.8);
        }
        .toggle-link:hover { color: white; }

        /* Responsive Anpassungen */
        @media (max-width: 768px) {
            body { 
                padding: 0.5rem; 
            }
            .form-grid { 
                grid-template-columns: 1fr; 
                gap: 1rem;
            }
            .title { 
                font-size: 1.8rem; 
            }
            .panel-title { 
                font-size: 1.3rem; 
                margin-bottom: 1rem;
            }
            .glass-panel { 
                padding: 1.25rem 1rem; 
                border-radius: 1rem;
                margin-bottom: 1.5rem;
            }
            
            /* Größere Touch-Flächen für Handys (Apple Best Practice) */
            input, textarea, .btn {
                min-height: 48px;
            }

            /* Glaskreise verkleinern für Mobile, damit sie nicht überlappen */
            .circle-1 { 
                width: 150px; 
                height: 150px; 
                top: -10px; 
                left: -20px; 
            }
            .circle-2 { 
                width: 200px; 
                height: 200px; 
                bottom: -20px; 
                right: -20px; 
            }

            /* Header-Bereich (Titel & Abmelden) optimieren */
            .header-flex { 
                flex-direction: column; 
                gap: 0.8rem; 
                align-items: stretch; 
                margin-bottom: 1.5rem;
            }
            .header-flex .title {
                margin-bottom: 0;
            }
            .btn-logout {
                width: 100%;
                text-align: center;
                padding: 0.8rem;
            }

            /* Responsive Tabelle (Optimierte Card View für Handys) */
            .table-responsive { 
                border-radius: 0; 
            }
            table, thead, tbody, th, td, tr { 
                display: block; 
                min-width: auto; 
                width: 100%;
            }
            thead tr { 
                display: none; /* Tabellenkopf verstecken */
            }
            tr {
                margin-bottom: 1.2rem;
                background: rgba(255, 255, 255, 0.08);
                border-radius: 0.75rem;
                border: 1px solid rgba(255, 255, 255, 0.15);
                box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
                padding: 0.5rem;
            }
            td {
                display: flex;
                flex-direction: column; /* Auf Mobile untereinander für lange Texte! */
                align-items: flex-start;
                text-align: left;
                border-bottom: 1px solid rgba(255, 255, 255, 0.08);
                padding: 0.6rem 0.5rem;
                word-break: break-word; /* Verhindert das Ausbrechen langer Wörter */
            }
            td:last-child { 
                border-bottom: none; 
            }
            td::before {
                content: attr(data-label);
                font-weight: 600;
                color: rgba(255, 255, 255, 0.6);
                font-size: 0.75rem;
                text-transform: uppercase;
                margin-bottom: 0.3rem; /* Abstand zwischen Label und Wert */
                text-align: left;
                display: block;
            }
            td.empty-state { 
                display: block; 
                text-align: center; 
                padding: 2rem 1rem;
            }
            td.empty-state::before { 
                display: none; 
            }
        }
    </style>
</head>
<body>

    <div class="circle circle-1"></div>
    <div class="circle circle-2"></div>

    <div class="container">
        
        <div id="message-box" class="message-box"></div>

        <!-- ========================================== -->
        <!-- AUTHENTIFIZIERUNG (LOGIN & REGISTRIERUNG) -->
        <!-- ========================================== -->
        <div id="auth-view" class="glass-panel">
            
            <!-- Login Formular -->
            <div id="login-container">
                <h1 class="title" style="font-size: 2rem; margin-bottom: 1rem;">Sicherer Login</h1>
                <form id="login-form">
                    <div class="form-group" style="margin-bottom: 1rem;">
                        <label for="login-email">E-Mail</label>
                        <input type="email" id="login-email" required>
                    </div>
                    <div class="form-group">
                        <label for="login-password">Passwort</label>
                        <input type="password" id="login-password" required>
                    </div>
                    <button type="submit" class="btn">Einloggen</button>
                </form>
                <div class="toggle-link" onclick="toggleAuth('register')">Noch kein Account? Hier registrieren.</div>
            </div>

            <!-- Registrierungs Formular (Standardmäßig versteckt) -->
            <div id="register-container" style="display: none;">
                <h1 class="title" style="font-size: 2rem; margin-bottom: 1rem;">Registrieren</h1>
                <form id="register-form">
                    <div class="form-group" style="margin-bottom: 1rem;">
                        <label for="reg-username">Dein Name</label>
                        <input type="text" id="reg-username" required>
                    </div>
                    <div class="form-group" style="margin-bottom: 1rem;">
                        <label for="reg-email">E-Mail</label>
                        <input type="email" id="reg-email" required>
                    </div>
                    <div class="form-group">
                        <label for="reg-password">Passwort</label>
                        <input type="password" id="reg-password" required minlength="6">
                    </div>
                    <button type="submit" class="btn">Account erstellen</button>
                </form>
                <div class="toggle-link" onclick="toggleAuth('login')">Bereits registriert? Zum Login.</div>
            </div>

        </div>

        <!-- ========================================== -->
        <!-- DASHBOARD ANSICHT (Zeiterfassung) -->
        <!-- ========================================== -->
        <div id="dashboard-view">
            <div class="header-flex">
                <h1 class="title">Arbeitszeiterfassung</h1>
                <button type="button" class="btn btn-logout" onclick="logout()">Abmelden (<span id="current-user-display"></span>)</button>
            </div>

            <div class="glass-panel">
                <h2 class="panel-title">Neuer Eintrag</h2>
                <form id="time-form">
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="datum">Datum</label>
                            <input type="date" id="datum" required>
                        </div>
                        <div class="form-group">
                            <label for="pause">Pause (in Minuten)</label>
                            <input type="number" id="pause" min="0" placeholder="z.B. 30" required>
                        </div>
                        <div class="form-group">
                            <label for="startzeit">Startzeit</label>
                            <input type="time" id="startzeit" required>
                        </div>
                        <div class="form-group">
                            <label for="endzeit">Endzeit</label>
                            <input type="time" id="endzeit" required>
                        </div>
                        <div class="form-group full-width">
                            <label for="beschreibung">Beschreibung / Projekt</label>
                            <input type="text" id="beschreibung" placeholder="Woran hast du gearbeitet?">
                        </div>
                    </div>
                    <button type="submit" class="btn">Zeit erfassen</button>
                </form>
            </div>

            <div class="glass-panel">
                <h2 class="panel-title">Deine Zeiterfassungen</h2>
                <div class="total-time-display">
                    Gesamte Arbeitszeit: <strong id="total-time-text">0h 0m</strong>
                </div>
                <div class="table-responsive">
                    <table>
                        <thead>
                            <tr>
                                <th>Datum</th>
                                <th>Zeitraum</th>
                                <th>Pause</th>
                                <th>Netto-Dauer</th>
                                <th>Beschreibung</th>
                                <th>Aktion</th>
                            </tr>
                        </thead>
                        <tbody id="entries-body">
                            <tr><td colspan="6" class="empty-state">Lade Daten...</td></tr>
                        </tbody>
                    </table>
                </div>
                <button type="button" class="btn btn-export" id="btn-export-pdf" onclick="exportierePDF()" style="display: none;">Als PDF herunterladen</button>
            </div>
        </div>

    </div>

    <script>
        // =========================================================================
        // WICHTIG: Hier musst du die URL eintragen, die du von Render.com bekommst!
        // Aktuell steht hier ein Platzhalter. Ändere ihn zu deiner Live-Backend-URL.
        // Beispiel: const API_BASE = 'https://meine-zeiterfassung.onrender.com/api';
        // =========================================================================
        const API_BASE = 'https://arbeitszeiten-bm14.onrender.com/api'; 
        
        let zeitEintraege = [];
        let currentUser = null; // Speichert Name und ID
        let authToken = null;   // Speichert das JWT Token

        const authView = document.getElementById('auth-view');
        const loginContainer = document.getElementById('login-container');
        const registerContainer = document.getElementById('register-container');
        const dashboardView = document.getElementById('dashboard-view');
        const currentUserDisplay = document.getElementById('current-user-display');
        const entriesBody = document.getElementById('entries-body');
        const totalTimeText = document.getElementById('total-time-text');
        const messageBox = document.getElementById('message-box');

        document.getElementById('datum').valueAsDate = new Date();
        document.getElementById('pause').value = 0;

        // Hilfsfunktionen UI
        function toggleAuth(view) {
            if(view === 'register') {
                loginContainer.style.display = 'none';
                registerContainer.style.display = 'block';
            } else {
                registerContainer.style.display = 'none';
                loginContainer.style.display = 'block';
            }
        }

        function zeigeNachricht(nachricht, typ = 'error') {
            messageBox.textContent = nachricht;
            messageBox.style.display = 'block';
            window.scrollTo({ top: 0, behavior: 'smooth' });
            if(typ === 'error') {
                messageBox.style.background = 'rgba(255, 100, 100, 0.2)';
                messageBox.style.borderColor = 'rgba(255, 100, 100, 0.5)';
            } else {
                messageBox.style.background = 'rgba(100, 255, 100, 0.2)';
                messageBox.style.borderColor = 'rgba(100, 255, 100, 0.5)';
            }
            setTimeout(() => { messageBox.style.display = 'none'; }, 4000);
        }

        // ==========================================
        // AUTHENTIFIZIERUNGS LOGIK (JWT)
        // ==========================================
        
        // Prüft, ob es noch ein gültiges Token in der Session gibt
        function checkSession() {
            const token = sessionStorage.getItem('authToken');
            const username = sessionStorage.getItem('authUsername');
            if (token && username) {
                authToken = token;
                currentUser = username;
                zeigeDashboard();
            }
        }

        // Registrierung
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('reg-username').value;
            const email = document.getElementById('reg-email').value;
            const password = document.getElementById('reg-password').value;

            try {
                const response = await fetch(`${API_BASE}/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password })
                });
                
                const data = await response.json();
                if (!response.ok) throw new Error(data.error || 'Fehler bei der Registrierung');

                zeigeNachricht("Erfolgreich registriert! Du kannst dich nun einloggen.", "success");
                toggleAuth('login');
                document.getElementById('register-form').reset();
            } catch (err) {
                zeigeNachricht(err.message);
            }
        });

        // Login
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;

            try {
                const response = await fetch(`${API_BASE}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await response.json();
                if (!response.ok) throw new Error(data.error || 'Login fehlgeschlagen');

                // Token und Username speichern
                authToken = data.token;
                currentUser = data.username;
                sessionStorage.setItem('authToken', authToken);
                sessionStorage.setItem('authUsername', currentUser);

                document.getElementById('login-form').reset();
                zeigeDashboard();

            } catch (err) {
                zeigeNachricht(err.message);
            }
        });

        function logout() {
            authToken = null;
            currentUser = null;
            sessionStorage.removeItem('authToken');
            sessionStorage.removeItem('authUsername');
            
            dashboardView.style.display = 'none';
            authView.style.display = 'block';
            zeitEintraege = [];
            aktualisiereAnsicht();
        }

        function zeigeDashboard() {
            authView.style.display = 'none';
            dashboardView.style.display = 'block';
            currentUserDisplay.textContent = currentUser;
            ladeEintraegeAusDB(); // Lädt die Daten mit dem neuen Token
        }

        // ==========================================
        // API KOMMUNIKATION (Mit Token-Header!)
        // ==========================================

        // Header-Funktion für geschützte Routen
        function getAuthHeaders() {
            return {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${authToken}` // Hier schicken wir den digitalen Ausweis!
            };
        }

        async function ladeEintraegeAusDB() {
            try {
                // Sende GET Request MIT dem Authorization Header
                const response = await fetch(`${API_BASE}/entries`, {
                    method: 'GET',
                    headers: getAuthHeaders()
                });
                
                if (response.status === 401 || response.status === 403) {
                    logout();
                    throw new Error("Sitzung abgelaufen. Bitte neu einloggen.");
                }
                if (!response.ok) throw new Error('Fehler beim Laden. Hast du die richtige API_BASE URL eingetragen?');
                
                const dbDaten = await response.json();
                
                zeitEintraege = dbDaten.map(dbEintrag => {
                    const stunden = Math.floor(dbEintrag.netto_minuten / 60);
                    const minuten = dbEintrag.netto_minuten % 60;
                    return {
                        id: dbEintrag.id,
                        datum: dbEintrag.datum,
                        startzeit: dbEintrag.startzeit.substring(0, 5),
                        endzeit: dbEintrag.endzeit.substring(0, 5),
                        pause: dbEintrag.pause_minuten,
                        nettoMinuten: dbEintrag.netto_minuten,
                        dauerString: `${stunden}h ${minuten}m`,
                        beschreibung: dbEintrag.beschreibung || '-'
                    };
                });
                aktualisiereAnsicht();
            } catch (error) {
                zeigeNachricht(error.message, "error");
                entriesBody.innerHTML = `<tr><td colspan="6" class="empty-state">Fehler beim Laden.</td></tr>`;
            }
        }

        document.getElementById('time-form').addEventListener('submit', async function(e) {
            e.preventDefault();

            const datum = document.getElementById('datum').value;
            const startzeit = document.getElementById('startzeit').value;
            const endzeit = document.getElementById('endzeit').value;
            const pause = parseInt(document.getElementById('pause').value) || 0;
            const beschreibung = document.getElementById('beschreibung').value;

            const startObj = new Date(`1970-01-01T${startzeit}:00`);
            let endObj = new Date(`1970-01-01T${endzeit}:00`);
            if (endObj < startObj) endObj.setDate(endObj.getDate() + 1);

            const nettoMinuten = Math.floor((endObj - startObj) / 60000) - pause;
            if (nettoMinuten < 0) {
                zeigeNachricht("Die Pause kann nicht länger als die anwesende Zeit sein!");
                return;
            }

            const payload = { datum, startzeit, endzeit, pause_minuten: pause, netto_minuten: nettoMinuten, beschreibung };

            try {
                // Sende POST Request MIT dem Authorization Header
                const response = await fetch(`${API_BASE}/entries`, {
                    method: 'POST',
                    headers: getAuthHeaders(),
                    body: JSON.stringify(payload)
                });

                if (response.status === 401 || response.status === 403) {
                    logout();
                    throw new Error("Sitzung abgelaufen.");
                }
                if (!response.ok) throw new Error('Speichern fehlgeschlagen');

                await ladeEintraegeAusDB();
                
                const aktuellesDatum = document.getElementById('datum').value;
                this.reset();
                document.getElementById('datum').value = aktuellesDatum;
                document.getElementById('pause').value = 0;
                
                zeigeNachricht("Eintrag erfolgreich gespeichert!", 'success');
            } catch (error) {
                zeigeNachricht(error.message, "error");
            }
        });

        async function loescheEintrag(id) {
            if(!confirm("Eintrag wirklich löschen?")) return;
            try {
                // Sende DELETE Request MIT dem Authorization Header
                const response = await fetch(`${API_BASE}/entries/${id}`, {
                    method: 'DELETE',
                    headers: getAuthHeaders()
                });
                if (!response.ok) throw new Error('Löschen fehlgeschlagen');
                await ladeEintraegeAusDB();
                zeigeNachricht("Gelöscht!", 'success');
            } catch (error) {
                zeigeNachricht("Fehler beim Löschen.", "error");
            }
        }

        // ==========================================
        // UI & EXPORT
        // ==========================================
        function formatiereDatum(datumString) {
            const teile = datumString.split('T')[0].split('-');
            if (teile.length === 3) return `${teile[2]}.${teile[1]}.${teile[0]}`;
            return datumString;
        }

        function aktualisiereAnsicht() {
            entriesBody.innerHTML = '';
            const btnExport = document.getElementById('btn-export-pdf');

            if (zeitEintraege.length === 0) {
                entriesBody.innerHTML = `<tr><td colspan="6" class="empty-state">Noch keine Zeiten erfasst.</td></tr>`;
                totalTimeText.textContent = "0h 0m";
                btnExport.style.display = 'none';
                return;
            }

            btnExport.style.display = 'block';
            let gesamtMinuten = 0;

            zeitEintraege.forEach(eintrag => {
                gesamtMinuten += eintrag.nettoMinuten;
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td data-label="Datum">${formatiereDatum(eintrag.datum)}</td>
                    <td data-label="Zeitraum">${eintrag.startzeit} - ${eintrag.endzeit}</td>
                    <td data-label="Pause">${eintrag.pause} Min</td>
                    <td data-label="Netto-Dauer"><strong>${eintrag.dauerString}</strong></td>
                    <td data-label="Beschreibung">${eintrag.beschreibung}</td>
                    <td data-label="Aktion">
                        <button class="btn btn-delete" onclick="loescheEintrag(${eintrag.id})">Löschen</button>
                    </td>
                `;
                entriesBody.appendChild(tr);
            });

            totalTimeText.textContent = `${Math.floor(gesamtMinuten / 60)}h ${gesamtMinuten % 60}m`;
        }

        function exportierePDF() {
            if (zeitEintraege.length === 0) return;

            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();

            doc.setFontSize(18);
            doc.text(`Arbeitszeiten Übersicht - ${currentUser}`, 14, 20);
            doc.setFontSize(12);
            doc.text("Gesamte Arbeitszeit: " + totalTimeText.textContent, 14, 30);

            const tableData = zeitEintraege.map(eintrag => [
                formatiereDatum(eintrag.datum),
                `${eintrag.startzeit} - ${eintrag.endzeit}`,
                `${eintrag.pause} Min`,
                eintrag.dauerString,
                eintrag.beschreibung
            ]);

            doc.autoTable({
                startY: 35,
                head: [['Datum', 'Zeitraum', 'Pause', 'Dauer', 'Beschreibung']],
                body: tableData,
                theme: 'grid',
                headStyles: { fillColor: [0, 25, 165] },
                styles: { fontSize: 10 }
            });

            const pdfBlob = doc.output('blob');
            const blobUrl = URL.createObjectURL(pdfBlob);
            const a = document.createElement('a');
            a.href = blobUrl;
            a.download = `Arbeitszeiten_${currentUser}.pdf`;
            a.target = '_blank'; 
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            setTimeout(() => URL.revokeObjectURL(blobUrl), 1000);
        }

        // Startpunkt
        checkSession();

    </script>
</body>
</html>
